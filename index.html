<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENG ELGIZAWY | ULTRA TIMER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }

        /* الاسم فخم وقابل للتعديل */
        .brand-wrapper {
            margin-bottom: 15px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-name {
            font-family: 'Cinzel Decorative', serif;
            font-size: 2.2rem;
            color: #ffffff;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .brand-name:hover {
            color: #38bdf8;
        }

        .brand-input {
            background: transparent;
            border: none;
            border-bottom: 2px solid #38bdf8;
            color: #ffffff;
            font-family: 'Cinzel Decorative', serif;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            text-transform: uppercase;
            width: 100%;
            max-width: 500px;
        }

        /* تحسين اختيار الوضع (تبديل أنيق) */
        .mode-selector {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .mode-btn {
            background: transparent;
            color: #555;
            border: none;
            padding: 6px 15px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: 600;
        }

        .mode-btn.active {
            color: #38bdf8;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        /* شاشة العرض العملاقة */
        .display-container {
            position: relative;
            margin-bottom: 40px;
        }

        .timer-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 11rem; 
            font-weight: bold;
            color: #f0f0f0; 
            letter-spacing: -2px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            line-height: 1;
        }

        /* مدخلات وقت العد التنازلي منبثقة بشكل أنيق فوق الأرقام عند الحاجة */
        .countdown-inputs {
            display: none;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 20px 40px;
            border-radius: 12px;
            border: 1px solid #222;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        .countdown-inputs input {
            background: #111;
            border: 1px solid #333;
            color: #38bdf8;
            font-family: 'Share Tech Mono', monospace;
            font-size: 2.5rem;
            width: 80px;
            text-align: center;
            padding: 5px;
            border-radius: 6px;
        }

        .countdown-inputs input:focus {
            border-color: #38bdf8;
            outline: none;
        }

        .countdown-inputs .save-inputs-btn {
            background: #38bdf8;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 1px;
        }

        /* تنظيم صف الأزرار ليكون متناسقاً وبدون زحمة */
        .buttons-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            max-width: 800px;
            margin: 0 auto;
        }

        button.control-btn {
            background: transparent;
            color: #aaaaaa;
            border: 1px solid #333333;
            padding: 12px 30px;
            font-size: 0.85rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            letter-spacing: 1.5px;
            min-width: 130px;
        }

        button.control-btn:hover {
            color: #ffffff;
            border-color: #ffffff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        button#startBtn {
            border-color: #ffffff;
            color: #ffffff;
            font-weight: 600;
        }
        button#startBtn:hover {
            background-color: #ffffff;
            color: #000000;
        }

        button#stopBtn {
            border-color: #ff3333;
            color: #ff3333;
        }
        button#stopBtn:hover {
            background-color: #ff3333;
            color: #ffffff;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
        }

        button#setCountdownBtn {
            border-color: #38bdf8;
            color: #38bdf8;
        }
        button#setCountdownBtn:hover {
            background-color: #38bdf8;
            color: #000000;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        /* ريسبونسيف ذكي للموبايل */
        @media (max-width: 900px) {
            .brand-name { font-size: 1.8rem; }
            .timer-display { font-size: 6rem; }
            button.control-btn { padding: 10px 20px; font-size: 0.8rem; min-width: 110px; }
        }
        @media (max-width: 500px) {
            .brand-name { font-size: 1.4rem; }
            .timer-display { font-size: 4rem; }
            .buttons-group { flex-direction: column; width: 100%; }
            button.control-btn { width: 80%; }
            .countdown-inputs { width: 90%; padding: 15px; }
            .countdown-inputs input { font-size: 1.8rem; width: 60px; }
        }

        #hiddenVideo { display: none; }
    </style>
</head>
<body>

    <div class="container">
        <!-- الاسم المطور -->
        <div class="brand-wrapper" id="brandContainer">
            <div class="brand-name" id="brandLabel" onclick="editBrandName()">ENG ELGIZAWY</div>
        </div>

        <!-- وضعية العداد (مينيمال بدون زحمة زراير) -->
        <div class="mode-selector">
            <span class="mode-btn active" id="modeUp" onclick="switchMode('up')">COUNT UP</span>
            <span style="color: #333;">|</span>
            <span class="mode-btn" id="modeDown" onclick="switchMode('down')">COUNT DOWN</span>
        </div>

        <!-- منطقة العرض والمدخلات الذكية -->
        <div class="display-container">
            <div class="timer-display" id="display">00:00:00</div>
            
            <!-- واجهة الإدخال المنبثقة للعد التنازلي للخصوصية والترتيب -->
            <div class="countdown-inputs" id="inputContainer">
                <input type="number" id="inputH" placeholder="00" min="0" max="99" value="00">
                <span style="color:#333; font-size: 2rem;">:</span>
                <input type="number" id="inputM" placeholder="05" min="0" max="59" value="05">
                <span style="color:#333; font-size: 2rem;">:</span>
                <input type="number" id="inputS" placeholder="00" min="0" max="59" value="00">
                <button class="save-inputs-btn" onclick="saveCountdownInputs()">SET</button>
            </div>
        </div>
        
        <!-- الأزرار الرئيسية المنظمة في صف واحد هندسي فخم -->
        <div class="buttons-group">
            <button class="control-btn" id="startBtn" onclick="startTimer()">START</button>
            <button class="control-btn" id="stopBtn" onclick="stopTimer()" style="display: none;">STOP</button>
            <button class="control-btn" id="setCountdownBtn" onclick="showCountdownPopup()" style="display: none;">SET TIME</button>
            <button class="control-btn" id="resetBtn" onclick="resetTimer()">RESET</button>
            <button class="control-btn" id="pipBtn" onclick="togglePiP()">PIP MODE</button>
            <button class="control-btn" id="fsBtn" onclick="toggleFullscreen()">APP MODE</button>
        </div>
    </div>

    <video id="hiddenVideo" autoplay muted loop playsinline></video>

    <script>
        let timerInterval;
        let currentMode = 'up'; 
        
        // المتغيرات الأساسية للوقت (سيتم تحميلها من الذاكرة إن وجدت)
        let state = {
            isRunning: false,
            mode: 'up',
            startTime: 0,
            elapsedTime: 0,
            countdownTotalMs: 0,
            brandName: "ENG ELGIZAWY"
        };

        // تحميل البيانات من الذاكرة فور فتح الصفحة (الوقاية من الريفريش)
        function loadState() {
            const savedState = localStorage.getItem('ultraTimerState');
            if (savedState) {
                const parsed = JSON.parse(savedState);
                state = parsed;
                
                // استعادة الاسم
                document.getElementById('brandLabel').textContent = state.brandName;
                
                // استعادة الوضع
                currentMode = state.mode;
                document.getElementById('modeUp').classList.toggle('active', currentMode === 'up');
                document.getElementById('modeDown').classList.toggle('active', currentMode === 'down');
                document.getElementById('setCountdownBtn').style.display = currentMode === 'down' ? 'inline-block' : 'none';

                // إذا كان العداد يعمل أثناء عمل الريفريش، نقوم بتحديث الـ startTime بناءً على الوقت الحالي الحقيقي
                if (state.isRunning) {
                    const actualPassedTime = Date.now() - state.startTime;
                    
                    if (currentMode === 'up') {
                        state.elapsedTime = actualPassedTime;
                    } else {
                        // في العد التنازلي
                        let timeLeft = state.countdownTotalMs - actualPassedTime;
                        if (timeLeft <= 0) {
                            state.isRunning = false;
                            state.elapsedTime = state.countdownTotalMs;
                        }
                    }
                    
                    if (state.isRunning) {
                        timerInterval = setInterval(updateTime, 100);
                        document.getElementById('startBtn').style.display = 'none';
                        document.getElementById('stopBtn').style.display = 'inline-block';
                    }
                }
                
                updateDisplay();
            }
        }

        function saveStateToStorage() {
            localStorage.setItem('ultraTimerState', JSON.stringify(state));
        }

        // كود الاسم
        function editBrandName() {
            const currentName = document.getElementById('brandLabel').textContent;
            const container = document.getElementById('brandContainer');
            container.innerHTML = `<input type="text" class="brand-input" id="brandEdit" value="${currentName}" onblur="saveBrandName()" onkeydown="checkEnter(event)">`;
            document.getElementById('brandEdit').focus();
            document.getElementById('brandEdit').select();
        }

        function saveBrandName() {
            const input = document.getElementById('brandEdit');
            if(!input) return;
            let newName = input.value.trim();
            if (newName === "") newName = "ENG ELGIZAWY";
            state.brandName = newName;
            saveStateToStorage();
            const container = document.getElementById('brandContainer');
            container.innerHTML = `<div class="brand-name" id="brandLabel" onclick="editBrandName()">${newName}</div>`;
        }

        function checkEnter(event) {
            if (event.key === "Enter") saveBrandName();
        }

        // التبديل بين الأنماط بسلاسة وبدون زحمة
        function switchMode(mode) {
            if (state.isRunning || state.elapsedTime > 0) {
                if(!confirm("Changing mode will reset the current timer. Proceed?")) return;
            }
            
            resetTimer();
            currentMode = mode;
            state.mode = mode;
            
            document.getElementById('modeUp').classList.toggle('active', mode === 'up');
            document.getElementById('modeDown').classList.toggle('active', mode === 'down');
            document.getElementById('setCountdownBtn').style.display = mode === 'down' ? 'inline-block' : 'none';
            
            if (mode === 'down') {
                showCountdownPopup();
            } else {
                updateDisplay();
            }
            saveStateToStorage();
        }

        function showCountdownPopup() {
            document.getElementById('inputContainer').style.display = 'flex';
        }

        function saveCountdownInputs() {
            let h = parseInt(document.getElementById('inputH').value) || 0;
            let m = parseInt(document.getElementById('inputM').value) || 0;
            let s = parseInt(document.getElementById('inputS').value) || 0;
            
            state.countdownTotalMs = ((h * 3600) + (m * 60) + s) * 1000;
            state.elapsedTime = 0;
            
            document.getElementById('inputContainer').style.display = 'none';
            updateDisplay();
            saveStateToStorage();
        }

        // تحديث الرندرة على الشاشة
        function updateTime() {
            if (currentMode === 'up') {
                state.elapsedTime = Date.now() - state.startTime;
            } else {
                let timeLeft = state.countdownTotalMs - (Date.now() - state.startTime);
                if (timeLeft <= 0) {
                    timeLeft = 0;
                    clearInterval(timerInterval);
                    timerInterval = null;
                    state.isRunning = false;
                    state.elapsedTime = state.countdownTotalMs;
                    document.getElementById('startBtn').textContent = 'START';
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('stopBtn').style.display = 'none';
                    alert("Time is UP!");
                }
                // الحفاظ على قيمة الوقت المنقضي الفعلي عند التوقف
                if(state.isRunning) {
                    state.elapsedTime = state.countdownTotalMs - timeLeft;
                }
            }
            
            updateDisplay();
            saveStateToStorage();
        }

        function updateDisplay() {
            let totalMs = currentMode === 'up' ? state.elapsedTime : (state.countdownTotalMs - state.elapsedTime);
            if (totalMs < 0) totalMs = 0;

            let totalSeconds = Math.floor(totalMs / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            hours = String(hours).padStart(2, '0');
            minutes = String(minutes).padStart(2, '0');
            seconds = String(seconds).padStart(2, '0');

            const timeString = `${hours}:${minutes}:${seconds}`;
            document.getElementById('display').textContent = timeString;
            
            if(document.pictureInPictureElement) {
                renderPiPCanvas(timeString);
            }
        }

        function startTimer() {
            if (currentMode === 'down' && state.countdownTotalMs === 0) {
                showCountdownPopup();
                return;
            }

            state.isRunning = true;
            state.startTime = Date.now() - state.elapsedTime;
            timerInterval = setInterval(updateTime, 100);
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            saveStateToStorage();
        }

        function stopTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            state.isRunning = false;
            document.getElementById('startBtn').textContent = 'RESUME';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            saveStateToStorage();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            state.isRunning = false;
            state.elapsedTime = 0;
            
            if(currentMode === 'up') {
                state.countdownTotalMs = 0;
            }
            
            updateDisplay();
            document.getElementById('startBtn').textContent = 'START';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            saveStateToStorage();
        }

        // كود الـ PiP العائم الفخم
        const canvas = document.createElement('canvas');
        canvas.width = 320;
        canvas.height = 120;
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('hiddenVideo');

        function renderPiPCanvas(text) {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#38bdf8'; 
            ctx.font = 'bold 46px Courier New';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, canvas.width / 2, canvas.height / 2);
        }

        async function togglePiP() {
            try {
                if (document.pictureInPictureElement) {
                    await document.exitPictureInPicture();
                    document.getElementById('pipBtn').textContent = 'PIP MODE';
                } else {
                    renderPiPCanvas(document.getElementById('display').textContent);
                    const stream = canvas.captureStream(10);
                    video.srcObject = stream;
                    
                    video.onloadedmetadata = async () => {
                        try {
                            await video.requestPictureInPicture();
                            document.getElementById('pipBtn').textContent = 'EXIT PIP';
                        } catch (err) {
                            console.error(err);
                        }
                    };
                }
            } catch (error) {
                alert("PiP mode interaction error.");
            }
        }

        video.addEventListener('leavepictureinpicture', () => {
            document.getElementById('pipBtn').textContent = 'PIP MODE';
        });

        // كود الـ Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    alert(`Error: ${err.message}`);
                });
                document.getElementById('fsBtn').textContent = 'EXIT APP';
            } else {
                document.exitFullscreen();
                document.getElementById('fsBtn').textContent = 'APP MODE';
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                document.getElementById('fsBtn').textContent = 'APP MODE';
            }
        });

        // تشغيل الـ Load عند فتح الصفحة فوراً
        window.onload = loadState;
    </script>
</body>
</html>
